<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI TOC Stress Test</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #f5f7fb;
            color: #18212f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(118, 159, 255, 0.18), transparent 24%),
                linear-gradient(180deg, #f8fbff 0%, #eef3fb 100%);
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(24, 33, 47, 0.08);
            background: rgba(248, 251, 255, 0.92);
            backdrop-filter: blur(10px);
        }

        .toolbar strong {
            font-size: 18px;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            background: #dce8ff;
            color: #23437f;
            font-size: 13px;
            font-weight: 600;
        }

        .hint {
            color: #516177;
            font-size: 13px;
        }

        #chat-shell {
            height: calc(100vh - 73px);
            overflow-y: auto;
            padding: 32px 24px 80px;
        }

        .turn {
            max-width: 920px;
            margin: 0 auto 18px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(24, 33, 47, 0.08);
            box-shadow: 0 14px 40px rgba(59, 92, 153, 0.08);
        }

        .query-text-line {
            font-weight: 700;
            font-size: 16px;
            color: #162033;
            margin-bottom: 12px;
        }

        .answer p {
            margin: 0 0 10px;
            color: #415067;
            line-height: 1.65;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <strong>AI TOC Stress Test</strong>
        <span class="badge" id="node-count">DOM nodes: 0</span>
        <span class="badge" id="turn-count">Turns: 0</span>
        <span class="badge" id="fps">FPS: --</span>
        <span class="hint">滚动这个页面，观察目录脚本在 10,000+ DOM 节点下的滚动流畅度。</span>
    </div>
    <main id="chat-shell"></main>

    <script src="./AI-web-enhancer.js"></script>
    <script>
        const shell = document.getElementById('chat-shell');
        const turnCount = 3000;
        const fragment = document.createDocumentFragment();

        function paragraph(turn, part) {
            return `这是第 ${turn} 条消息的回答段落 ${part}。该文本用于模拟长对话场景下的真实 DOM 压力，包括目录提取、滚动高亮和回顶定位。`;
        }

        for (let i = 1; i <= turnCount; i++) {
            const turn = document.createElement('section');
            turn.className = 'turn';

            const prompt = document.createElement('div');
            prompt.className = 'query-text-line';
            prompt.textContent = `用户问题 ${i}：这是用于压力测试的目录条目 ${i}`;

            const answer = document.createElement('div');
            answer.className = 'answer';

            for (let j = 1; j <= 3; j++) {
                const p = document.createElement('p');
                p.textContent = paragraph(i, j);
                answer.appendChild(p);
            }

            turn.append(prompt, answer);
            fragment.appendChild(turn);
        }

        shell.appendChild(fragment);

        document.getElementById('turn-count').textContent = `Turns: ${turnCount}`;
        document.getElementById('node-count').textContent = `DOM nodes: ${document.querySelectorAll('*').length}`;

        let frames = 0;
        let last = performance.now();

        function tick(now) {
            frames++;
            if (now - last >= 1000) {
                const fps = Math.round((frames * 1000) / (now - last));
                document.getElementById('fps').textContent = `FPS: ${fps}`;
                frames = 0;
                last = now;
            }
            requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
    </script>
</body>
</html>
